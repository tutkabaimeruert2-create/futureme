<!DOCTYPE html>
<html lang="kk">
<head>
  <link rel="stylesheet" href="premium.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <!-- AOS (Animate On Scroll) Library -->
  <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Профиль - FutureMe</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="theme-v2.css" />
  <link rel="stylesheet" href="ui-pro.css" />
  <link rel="stylesheet" href="mobile-fix.css" />
</head>
<body>
  <div id="navbar"></div>

  <main class="container" style="padding: 40px 0; max-width: 1200px;">
    <div class="profile-header">
      <div>
        <h1>Сәлем, <span id="profileNameHeader"></span>!</h1>
      </div>
      <button id="logoutBtn" class="btn btn-outline">Шығу</button>
    </div>

    <div class="profile-grid">
      
      <!-- 1. Соңғы тест нәтижесі -->
      <div class="profile-card">
        <h3>Соңғы тест нәтижесі</h3>
        <div id="testResultContent"></div>
      </div>

      <!-- 2. Ұсынылған мамандықтар -->
      <div class="profile-card">
        <h3>Сізге ұсынылатын мамандықтар</h3>
        <div id="recommendedMajors" class="majors-list"></div>
      </div>

      <div class="profile-card full-width">
        <h3>Сақталған университеттер</h3>
        <!-- Міне осы жерде ID міндетті түрде savedUniversitiesList болуы керек -->
        <div id="savedUniversitiesList" class="saved-unis-grid"></div>
      </div>
    </div>
  </main>

  <div id="footer"></div>

  <script src="script.js"></script>
  <script src="auth.js"></script>
  <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
<script>
  AOS.init({
    duration: 800, // Анимация ұзақтығы
    once: true,    // Анимация бір рет қана орындалады
  });
</script>
</body>
</html>
